<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serverless Chat</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3 class="sidebar-title">Channels</h3>
                <button id="add-room-btn" title="Add Room">+</button>
            </div>
            <div id="new-room-container" class="new-room-container hidden">
                <input type="text" id="new-room-input" placeholder="new-room..." autocomplete="off">
            </div>
            <ul class="channel-list" id="channel-list">
                <!-- dynamic list -->
            </ul>
        </div>
        <div class="chat-container">
            <header class="chat-header">
                <div class="status-indicator" id="status-dot"></div>
                <h2 id="room-title">General</h2>
                <span id="connection-status">Connecting...</span>
            </header>
            
            <div class="chat-box" id="chat-box">
                <!-- Messages will appear here -->
            </div>
            <div id="typing-indicator" class="typing-indicator hidden"></div>

            <form id="chat-form" class="chat-input-area">
                <input type="text" id="username-input" placeholder="Your Name" required>
                <input type="text" id="message-input" placeholder="Type a message..." required autocomplete="off">
                <button type="submit" id="send-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
